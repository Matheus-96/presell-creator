name: PR Checks

on:
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    name: Backend — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build templates and sections bundles
        run: npm run build:templates && npm run build:sections

      - name: Run tests
        run: npm test --workspace backend

      - name: Build
        run: npm run build:backend

  frontend-checks:
    name: Frontend — Typecheck, Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc -b --noEmit

      - name: Run tests
        run: npm run test:run --workspace frontend

      - name: Build templates
        run: npm run build:templates

      - name: Build
        run: npm run build:frontend
