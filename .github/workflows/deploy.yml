name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Executar deploy Docker
        env:
          REPO_DIR: /home/projetos/presell-creator
          DEPLOY_BRANCH: master
          COMPOSE_FILE: docker-compose.yaml
          HEALTHCHECK_URL: http://localhost:80/health
        run: bash $REPO_DIR/scripts/deploy-docker.sh
