# lighttpd — configuração para ambiente Docker
# Proxy reverso para o serviço "app" (Node.js) na rede interna do Docker.
# Arquivos estáticos do frontend são servidos diretamente por este container.

server.document-root = "/var/www/html"
server.port = 80
server.pid-file = "/run/lighttpd.pid"
server.errorlog = "/dev/stderr"

accesslog.filename = "/dev/stdout"

server.modules = (
  "mod_accesslog",
  "mod_proxy",
  "mod_rewrite",
  "mod_staticfile"
)

mimetype.assign = (
  ".html"    => "text/html; charset=utf-8",
  ".htm"     => "text/html; charset=utf-8",
  ".css"     => "text/css; charset=utf-8",
  ".js"      => "application/javascript",
  ".mjs"     => "application/javascript",
  ".json"    => "application/json",
  ".map"     => "application/json",
  ".svg"     => "image/svg+xml",
  ".png"     => "image/png",
  ".jpg"     => "image/jpeg",
  ".jpeg"    => "image/jpeg",
  ".webp"    => "image/webp",
  ".gif"     => "image/gif",
  ".ico"     => "image/x-icon",
  ".woff"    => "font/woff",
  ".woff2"   => "font/woff2",
  ".ttf"     => "font/ttf",
  ".eot"     => "application/vnd.ms-fontobject",
  ".txt"     => "text/plain",
  ".xml"     => "application/xml",
  ".webmanifest" => "application/manifest+json"
)

# ── Rotas dinâmicas → Node.js backend ─────────────────────────────────────
# "app" é o nome do serviço no docker-compose; Docker resolve para o IP interno.
$HTTP["url"] =~ "^/(api|go|media|health|static|p)(/|$)" {
    proxy.server = ( "" => (( "host" => "app", "port" => 3002 )) )
    proxy.forwarded = (
        "for"   => 1,
        "proto" => 1,
        "host"  => 1
    )
}

# ── SPA fallback para /admin-app/* ─────────────────────────────────────────
# Rotas do React Router sem extensão de arquivo recebem o index.html.
# Se ADMIN_FRONTEND_PATH foi alterado no build, ajuste o padrão abaixo.
$HTTP["url"] =~ "^/admin-app/(?!.*\.[a-z]{2,4}$)" {
    url.rewrite-once = ( "^(/admin-app/).*" => "$1index.html" )
}
