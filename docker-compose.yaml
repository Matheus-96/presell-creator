services:

  # ── Node.js backend ─────────────────────────────────────────────────────────
  # Não expõe porta no host — só acessível pelo lighttpd via rede interna Docker.
  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    expose:
      - "3002"
    volumes:
      - presell_storage:/app/storage
    env_file: .env
    environment:
      NODE_ENV: production
      # lighttpd está à frente do Node dentro do stack → trust 1 hop de proxy
      TRUST_PROXY: "1"
      # auto = Secure quando X-Forwarded-Proto: https (Cloudflare), sem Secure em HTTP local
      SESSION_COOKIE_SECURE: "auto"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          require('http').get('http://localhost:3002/health',
          r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── lighttpd (reverse proxy + static files) ─────────────────────────────────
  # Porta 80 exposta no host. Serve /admin-app/* direto e proxeia o resto para "app".
  lighttpd:
    build:
      context: .
      target: lighttpd-static
      args:
        ADMIN_FRONTEND_PATH: /admin-app   # deve bater com ADMIN_FRONTEND_PATH do .env
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy

  # ── Cloudflare Tunnel (opcional) ─────────────────────────────────────────────
  # Descomente para rodar o tunnel no mesmo stack e aponte para "lighttpd:80".
  # Crie o token em: one.dash.cloudflare.com → Networks → Tunnels
  # Adicione CLOUDFLARE_TUNNEL_TOKEN ao .env ou nas variáveis do Portainer.
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     lighttpd:
  #       condition: service_started

volumes:
  presell_storage:
    # Para bind-mount em diretório do host em vez de volume gerenciado:
    #   driver: local
    #   driver_opts:
    #     type: none
    #     o: bind
    #     device: /caminho/no/host/storage
